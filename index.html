<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="./index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Karla:ital,wght@0,200..800;1,200..800&family=Orbitron:wght@400..900&family=Oxanium:wght@200..800&family=Space+Grotesk:wght@300..700&family=Spinnaker&display=swap"
        rel="stylesheet">

</head>

<body>
    <div id="light-mode">
        <div class="top-section">
            <h1>Metric/Imperial Unit Conversion</h1>
            <input id="l-input-el">
            <button id="l-convert-btn">Convert</button>
        </div>
        <div id="length-container" class="bottom-section">
            <h2>Length (Meter/Feet)</h2>
            <h3 id="l-length-converter"></h3>
        </div>
        <div id="volume-container" class="bottom-section">
            <h2>Volume (Liters/Gallons)</h2>
            <h3 id="l-volume-converter"></h3>
        </div>
        <div id="mass-container" class="bottom-section">
            <h2>Mass (Kilograms/Pounds)</h2>
            <h3 id="l-mass-converter"></h3>
        </div>
    </div>
    <div id="dark-mode">
        <div class="top-section">
            <h1>Metric/Imperial Unit Conversion</h1>
            <input id="d-input-el">
            <button id="d-convert-btn">Convert</button>
        </div>
        <div id="length-container" class="bottom-section">
            <h2>Length (Meter/Feet)</h2>
            <h3 id="d-length-converter"></h3>
        </div>
        <div id="volume-container" class="bottom-section">
            <h2>Volume (Liters/Gallons)</h2>
            <h3 id="d-volume-converter"></h3>
        </div>
        <div id="mass-container" class="bottom-section">
            <h2>Mass (Kilograms/Pounds)</h2>
            <h3 id="d-mass-converter"></h3>
        </div>
    </div>
    <script src="index.js"></script>
</body>

</html>
